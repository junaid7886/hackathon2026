<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Find Doctors — RuralMed AI</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏥</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800;900&family=Playfair+Display:wght@700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        .doctors-header {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, var(--accent-teal), #27ae60);
            color: white;
            margin-top: 70px;
        }
        
        .doctors-header h1 {
            font-family: var(--font-display);
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        .doctors-header p {
            opacity: 0.9;
            font-size: 1.1rem;
        }
        
        .search-filters {
            background: var(--bg-card);
            padding: 20px;
            border-bottom: 1px solid var(--border-light);
            position: sticky;
            top: 70px;
            z-index: 90;
        }
        
        .search-row {
            display: flex;
            gap: 12px;
            max-width: 1200px;
            margin: 0 auto;
            flex-wrap: wrap;
        }
        
        .search-row .form-input {
            flex: 1;
            min-width: 200px;
        }
        
        .search-row .form-select {
            min-width: 150px;
            flex: 0 0 auto;
        }
        
        .doctors-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 28px;
            padding: 35px 24px;
            max-width: 1200px;
            margin: 0 auto;
            margin-bottom: 80px;
        }
        
        .doctors-grid .doctor-card {
            background: var(--bg-card, #fff);
            border-radius: 16px;
            padding: 0 !important;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
            border: 1px solid #e5e7eb;
            overflow: hidden;
            display: block !important;
        }
        
        .doctors-grid .doctor-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.12);
        }
        
        .doctor-card-top {
            background: linear-gradient(135deg, #00bfa5, #27ae60);
            padding: 20px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .doctor-card-top .doctor-avatar {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            flex-shrink: 0;
            border: 3px solid rgba(255, 255, 255, 0.4);
        }
        
        .doctor-card-top .doctor-info {
            flex: 1;
            min-width: 0;
        }
        
        .doctor-card-top .doctor-info h3 {
            font-size: 1.15rem;
            margin-bottom: 4px;
            color: #ffffff;
            font-weight: 700;
            line-height: 1.3;
        }
        
        .doctor-card-top .doctor-specialty {
            color: rgba(255, 255, 255, 0.95);
            font-weight: 600;
            font-size: 0.9rem;
        }
        
        .doctor-card-body {
            padding: 20px 24px;
            background: #fff;
        }
        
        .doctor-card-body .doctor-hospital {
            color: #6b7280;
            font-size: 0.9rem;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .doctor-details {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
            padding: 16px;
            background: #f8f9fa;
            border-radius: 12px;
        }
        
        .doctor-stat {
            text-align: center;
        }
        
        .doctor-stat-icon {
            font-size: 1.2rem;
            margin-bottom: 4px;
        }
        
        .doctor-stat-value {
            font-size: 1rem;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 2px;
        }
        
        .doctor-stat-label {
            font-size: 0.75rem;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .doctor-actions {
            display: flex;
            gap: 12px;
        }
        
        .doctor-actions .btn {
            flex: 1;
            font-size: 0.9rem;
            padding: 14px 16px;
            border-radius: 12px;
            font-weight: 600;
            text-align: center;
            text-decoration: none;
            cursor: pointer;
            border: none;
        }
        
        .btn-call {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: white;
            box-shadow: 0 4px 15px rgba(39, 174, 96, 0.3);
        }
        
        .btn-call:hover {
            background: linear-gradient(135deg, #219a52, #27ae60);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(39, 174, 96, 0.4);
        }
        
        .btn-secondary {
            background: #f3f4f6;
            color: #374151;
            border: 1px solid #e5e7eb;
        }
        
        .btn-secondary:hover {
            background: #e5e7eb;
        }
        
        .no-results {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }
        
        .no-results .icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }
        
        @media (max-width: 768px) {
            .doctors-header {
                padding: 30px 15px;
            }
            .doctors-header h1 {
                font-size: 1.8rem;
            }
            .search-filters {
                top: 60px;
            }
            .doctors-grid {
                grid-template-columns: 1fr;
                padding: 20px 15px;
                gap: 20px;
            }
            .doctor-card-top {
                padding: 16px 20px;
            }
            .doctor-card-top .doctor-avatar {
                width: 55px;
                height: 55px;
                font-size: 1.6rem;
            }
            .doctor-card-top .doctor-info h3 {
                font-size: 1.05rem;
            }
            .doctor-card-body {
                padding: 16px 20px;
            }
            .doctor-details {
                padding: 12px;
                gap: 8px;
            }
            .doctor-stat-value {
                font-size: 0.9rem;
            }
            .doctor-stat-label {
                font-size: 0.7rem;
            }
        }
    </style>
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-content">
            <a href="dashboard.html" class="navbar-logo">
                <div class="logo-icon">🏥</div>
                <span class="logo-text">Rural<span>Med</span> AI</span>
            </a>

            <div class="navbar-nav">
                <a href="dashboard.html" class="nav-link">
                    <span class="nav-icon">🏠</span>
                    <span>Home</span>
                </a>
                <a href="chat.html" class="nav-link">
                    <span class="nav-icon">💬</span>
                    <span>Chat</span>
                </a>
                <a href="doctors.html" class="nav-link active">
                    <span class="nav-icon">👨‍⚕️</span>
                    <span>Doctors</span>
                </a>
                <a href="hospitals.html" class="nav-link">
                    <span class="nav-icon">🏥</span>
                    <span>Hospitals</span>
                </a>
                <a href="profile.html" class="nav-link">
                    <span class="nav-icon">👤</span>
                    <span>Profile</span>
                </a>
            </div>

            <div class="lang-selector">
                <button class="lang-btn active" data-lang="en">EN</button>
                <button class="lang-btn" data-lang="hi">हि</button>
                <button class="lang-btn" data-lang="te">తె</button>
            </div>
        </div>
    </nav>

    <!-- Doctors Header -->
    <div class="doctors-header">
        <h1>👨‍⚕️ Find Doctors</h1>
        <p>Connect with qualified healthcare professionals near you</p>
    </div>

    <!-- Search and Filters -->
    <div class="search-filters">
        <div class="search-row">
            <input type="text" id="searchDoctor" class="form-input" placeholder="🔍 Search by name or specialty...">
            <select id="filterSpecialty" class="form-input form-select">
                <option value="">All Specialties</option>
                <option value="General">General Physician</option>
                <option value="Cardio">Cardiologist</option>
                <option value="Derma">Dermatologist / Skin</option>
                <option value="ENT">ENT Specialist</option>
                <option value="Pediatric">Pediatrician</option>
                <option value="Gynec">Gynecologist</option>
                <option value="Ortho">Orthopedic</option>
                <option value="Neuro">Neurologist</option>
                <option value="Ophthalm">Ophthalmologist / Eye</option>
                <option value="Pulmo">Pulmonologist / Lungs</option>
                <option value="Gastro">Gastroenterologist</option>
                <option value="Endo">Endocrinologist / Diabetes</option>
                <option value="Psych">Psychiatrist</option>
                <option value="Urolog">Urologist</option>
                <option value="Oncolog">Oncologist / Cancer</option>
                <option value="Surgeon">General Surgeon</option>
                <option value="Ayurveda">Ayurveda</option>
            </select>
            <select id="filterLanguage" class="form-input form-select">
                <option value="">All Languages</option>
                <option value="Telugu">Telugu</option>
                <option value="Hindi">Hindi</option>
                <option value="English">English</option>
                <option value="Tamil">Tamil</option>
            </select>
        </div>
    </div>

    <!-- Doctors Grid -->
    <div class="doctors-grid" id="doctorsGrid">
        <!-- Doctors will be rendered here by JavaScript -->
    </div>

    <!-- Mobile Navigation -->
    <nav class="mobile-nav">
        <div class="mobile-nav-content">
            <a href="dashboard.html" class="mobile-nav-btn">
                <span class="nav-icon">🏠</span>
                <span>Home</span>
            </a>
            <a href="chat.html" class="mobile-nav-btn">
                <span class="nav-icon">💬</span>
                <span>Chat</span>
            </a>
            <a href="skin-analysis.html" class="mobile-nav-btn">
                <span class="nav-icon">📷</span>
                <span>Skin</span>
            </a>
            <a href="hospitals.html" class="mobile-nav-btn">
                <span class="nav-icon">🏥</span>
                <span>Hospitals</span>
            </a>
            <a href="profile.html" class="mobile-nav-btn">
                <span class="nav-icon">👤</span>
                <span>Profile</span>
            </a>
        </div>
    </nav>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script src="../js/data.js"></script>
    <script src="../js/app.js"></script>
    <script>
        // Initialize doctors page
        document.addEventListener('DOMContentLoaded', function() {
            renderDoctors();

            // Search functionality
            document.getElementById('searchDoctor').addEventListener('input', filterDoctors);
            document.getElementById('filterSpecialty').addEventListener('change', filterDoctors);
            document.getElementById('filterLanguage').addEventListener('change', filterDoctors);
        });

        function filterDoctors() {
            const search = document.getElementById('searchDoctor').value.toLowerCase();
            const specialty = document.getElementById('filterSpecialty').value;
            const language = document.getElementById('filterLanguage').value;

            const filtered = DOCTORS.filter(doc => {
                const matchesSearch = !search ||
                    doc.name.toLowerCase().includes(search) ||
                    doc.specialty.toLowerCase().includes(search);
                const matchesSpecialty = !specialty || doc.specialty.includes(specialty);
                const matchesLanguage = !language || doc.lang.includes(language);

                return matchesSearch && matchesSpecialty && matchesLanguage;
            });

            renderDoctorsList(filtered);
        }

        function renderDoctors() {
            renderDoctorsList(DOCTORS);
        }

        function renderDoctorsList(doctors) {
            const grid = document.getElementById('doctorsGrid');

            if (doctors.length === 0) {
                grid.innerHTML = `
                    <div class="no-results" style="grid-column: 1 / -1;">
                        <div class="icon">🔍</div>
                        <h3>No doctors found</h3>
                        <p>Try adjusting your search or filters</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = doctors.map(doc => `
                <div class="doctor-card animate-scale-in">
                    <div class="doctor-card-top">
                        <div class="doctor-avatar">👨‍⚕️</div>
                        <div class="doctor-info">
                            <h3>${doc.name}</h3>
                            <div class="doctor-specialty">${doc.specialty}</div>
                        </div>
                    </div>
                    <div class="doctor-card-body">
                        <div class="doctor-hospital">📍 ${doc.hospital}</div>
                        <div class="doctor-details">
                            <div class="doctor-stat">
                                <div class="doctor-stat-icon">🎓</div>
                                <div class="doctor-stat-value">${doc.exp} yrs</div>
                                <div class="doctor-stat-label">Experience</div>
                            </div>
                            <div class="doctor-stat">
                                <div class="doctor-stat-icon">🗣️</div>
                                <div class="doctor-stat-value">${doc.lang.split(',')[0]}</div>
                                <div class="doctor-stat-label">Language</div>
                            </div>
                            <div class="doctor-stat">
                                <div class="doctor-stat-icon">💰</div>
                                <div class="doctor-stat-value">₹${doc.fee}</div>
                                <div class="doctor-stat-label">Fee</div>
                            </div>
                        </div>
                        <div class="doctor-actions">
                            <a href="tel:${doc.phone}" class="btn btn-call">📞 Call Now</a>
                            <button class="btn btn-secondary" onclick="showDoctorInfo('${doc.name}')">ℹ️ Details</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function showDoctorInfo(name) {
            const doc = DOCTORS.find(d => d.name === name);
            if (doc) {
                showToast(`${doc.name} - ${doc.specialty}\nExperience: ${doc.exp} years\nFee: ₹${doc.fee}\nLanguages: ${doc.lang}`);
            }
        }
    </script>
</body>

</html>
