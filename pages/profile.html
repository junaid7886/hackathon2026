<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>My Profile — Quick Care</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏥</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800;900&family=Playfair+Display:wght@700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-content">
            <a href="dashboard.html" class="navbar-logo">
                <div class="logo-icon">🏥</div>
                <span class="logo-text">Quick<span>Care</span></span>
            </a>

            <div class="navbar-nav">
                <a href="dashboard.html" class="nav-link">
                    <span class="nav-icon">🏠</span>
                    <span>Home</span>
                </a>
                <a href="chat.html" class="nav-link">
                    <span class="nav-icon">💬</span>
                    <span>Chat</span>
                </a>
                <a href="doctors.html" class="nav-link">
                    <span class="nav-icon">👨‍⚕️</span>
                    <span>Doctors</span>
                </a>
                <a href="hospitals.html" class="nav-link">
                    <span class="nav-icon">🏥</span>
                    <span>Hospitals</span>
                </a>
                <a href="health-records.html" class="nav-link">
                    <span class="nav-icon">📋</span>
                    <span>Records</span>
                </a>
                <a href="profile.html" class="nav-link active">
                    <span class="nav-icon">👤</span>
                    <span>Profile</span>
                </a>
            </div>

            <div class="lang-selector">
                <button class="lang-btn active" data-lang="en">EN</button>
            </div>
        </div>
    </nav>

    <!-- Page Container -->
    <div class="page-container">
        <!-- Profile Header -->
        <div class="profile-header">
            <div class="profile-avatar-large">👤</div>
            <h2 class="profile-name" id="profileDisplayName">Guest User</h2>
            <p class="profile-subtitle" id="profileSubtitle">Age 30 · Male · Blood Group O+</p>
        </div>

        <!-- Profile Content -->
        <div class="profile-content">
            <!-- Personal Information -->
            <div class="profile-section animate-slide-up">
                <div class="profile-section-title">Personal Information</div>

                <div class="form-group">
                    <label class="form-label">Full Name</label>
                    <input type="text" id="pName" class="form-input" placeholder="Your full name">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Age</label>
                        <input type="number" id="pAge" class="form-input" placeholder="Age" min="1" max="120">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Gender</label>
                        <select id="pGender" class="form-input form-select">
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Blood Group</label>
                        <select id="pBlood" class="form-input form-select">
                            <option value="A+">A+</option>
                            <option value="A-">A-</option>
                            <option value="B+">B+</option>
                            <option value="B-">B-</option>
                            <option value="O+">O+</option>
                            <option value="O-">O-</option>
                            <option value="AB+">AB+</option>
                            <option value="AB-">AB-</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Weight (kg)</label>
                        <input type="number" id="pWeight" class="form-input" placeholder="60" min="1" max="300">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Phone / Emergency Contact</label>
                    <input type="tel" id="pPhone" class="form-input" placeholder="+91 9XXXXXXXXX">
                </div>
            </div>

            <!-- Medical Conditions -->
            <div class="profile-section animate-slide-up" style="animation-delay: 0.1s;">
                <div class="profile-section-title">Medical Conditions</div>

                <div class="toggle-row">
                    <span class="toggle-label">
                        <span>🍬</span> Diabetes
                    </span>
                    <label class="toggle">
                        <input type="checkbox" id="pDiabetes">
                        <span class="toggle-slider"></span>
                    </label>
                </div>

                <div class="toggle-row">
                    <span class="toggle-label">
                        <span>💉</span> High Blood Pressure
                    </span>
                    <label class="toggle">
                        <input type="checkbox" id="pBP">
                        <span class="toggle-slider"></span>
                    </label>
                </div>

                <div class="toggle-row">
                    <span class="toggle-label">
                        <span>❤️</span> Heart Disease
                    </span>
                    <label class="toggle">
                        <input type="checkbox" id="pHeart">
                        <span class="toggle-slider"></span>
                    </label>
                </div>

                <div class="toggle-row">
                    <span class="toggle-label">
                        <span>🫁</span> Asthma / Breathing Issues
                    </span>
                    <label class="toggle">
                        <input type="checkbox" id="pAsthma">
                        <span class="toggle-slider"></span>
                    </label>
                </div>

                <div class="form-group mt-2">
                    <label class="form-label">Allergies (if any)</label>
                    <input type="text" id="pAllergies" class="form-input" placeholder="e.g., Penicillin, Peanuts">
                </div>

                <div class="form-group">
                    <label class="form-label">Current Medications</label>
                    <input type="text" id="pMeds" class="form-input" placeholder="e.g., Metformin 500mg">
                </div>
            </div>

            <!-- Language Preference -->
            <div class="profile-section animate-slide-up" style="animation-delay: 0.2s;">
                <div class="profile-section-title">Language Preference</div>

                <div class="form-group">
                    <label class="form-label">Preferred Language</label>
                    <select id="pLang" class="form-input form-select">
                        <option value="en">English</option>
                        <option value="ta">Tamil</option>
                        <option value="kn">Kannada</option>
                    </select>
                </div>
            </div>

            <!-- Save Button -->
            <button onclick="saveProfile()" class="btn btn-primary btn-block mb-3">
                ✅ Save Profile
            </button>

            <!-- Logout Button -->
            <button onclick="logout()" class="btn btn-secondary btn-block" style="margin-bottom: 100px;">
                🚪 Logout
            </button>
        </div>
    </div>

    <!-- Mobile Navigation -->
    <nav class="mobile-nav">
        <div class="mobile-nav-content">
            <a href="dashboard.html" class="mobile-nav-btn">
                <span class="nav-icon">🏠</span>
                <span>Home</span>
            </a>
            <a href="chat.html" class="mobile-nav-btn">
                <span class="nav-icon">💬</span>
                <span>Chat</span>
            </a>
            <a href="skin-analysis.html" class="mobile-nav-btn">
                <span class="nav-icon">📷</span>
                <span>Skin</span>
            </a>
            <a href="hospitals.html" class="mobile-nav-btn">
                <span class="nav-icon">🏥</span>
                <span>Hospitals</span>
            </a>
            <a href="profile.html" class="mobile-nav-btn active">
                <span class="nav-icon">👤</span>
                <span>Profile</span>
            </a>
        </div>
    </nav>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script src="../js/data.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/tracker.js"></script>
</body>

</html>
